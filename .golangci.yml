version: "2"

run:
  timeout: 5m
  relative-path-mode: gomod

linters:
  default: standard
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gocognit
    - gosec
    - misspell
    - nilerr
    - revive
  settings:
    gocognit:
      min-complexity: 15
  exclusions:
    generated: strict
    presets:
      - comments
      - common-false-positives

formatters:
  enable:
    - gofmt
    - goimports
